        <!-- Card Modal -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="card-details-modal" class="modal modal-bottom sm:modal-middle rounded-[30px]">
            <div class="modal-box">
                <p id="modal-head" class=" font-bold text-3xl pt-[15px] pb-[20px]">Fix broken image uploads</p>
                <div class="flex pb-[20px]">
                    <p id="modal-status">Opened</p>

                </div>

                    </div>

                    </div>
                </div>

                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
