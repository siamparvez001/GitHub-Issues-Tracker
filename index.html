<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind css and DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GitHub Issues Tracker</title>
</head>

<body class="min-h-screen my-auto max-w-md mx-auto bg-base-200">

    <!-- login page interfage -->
    <div class="logo mx-auto w-[100px] pt-[110px]">
        <img src="./images/github-logo.png" alt="">
    </div>
    <div class="mx-auto  text-center pt-[30px]">
        <p>GitHub Issues Tracker</p>
        <p>Sign in to manage your issues</p>
    </div>
    <div class="form-section pt-[20px]">
        <div class="card  mx-auto w-full max-w-sm shrink-0 ">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label">Username</label>
                    <input type="email" class="input" placeholder="Enter Username" />
                    <div><p class="text-blue-600">Default: admin</p></div>
                    <label class="label">Password</label>
                    <input type="password" class="input" placeholder="Password" />
                    <div><p class="text-blue-600">Default: admin123</p></div>
                    <button class="btn btn-primary mt-4">Login</button>
                </fieldset>
            </div>
        </div>
        <br>
        <hr>
        <br>
        <div class="mx-auto  text-center">
            <p>OR</p>
            <br><br>
            <p class="opacity-50">Demo Credentials:</p>
            <br>
            <p><span class="font-bold">Username: </span><span>admin</span></p>
            <p><span class="font-bold">Password: </span><span>admin123</span></p>
        </div>
    </div>







    <script src="./script.js"></script>
</body>

</html>
