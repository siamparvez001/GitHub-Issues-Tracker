<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white">
    

    <!-- LOGIN PAGE -->

    <section id="loginPage" class="min-h-screen flex items-center justify-center">

        <div class="card bg-white w-96 shadow-xl p-8 text-center">

            <img class="w-16 mx-auto mb-4" src="./images/github-logo.png" />

            <h2 class="text-2xl font-bold">
                GitHub Issues Tracker
            </h2>

            <p class="text-gray-500 mb-4">
                Sign in to manage issues
            </p>

            <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-3" />

            <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-3" />

            <button id="loginBtn" class="btn btn-primary w-full">
                Sign In
            </button><br>
            <hr>
            <p class="text-sm mt-3 text-gray-400">
                <span>Or</span><br>
                Demo Credentials:
                <br><br>
                <span>Username: admin</span><br>
                <span>Password: admin123</span>
            </p>

        </div>

    </section>



    <!-- MAIN PAGE -->

    <section id="mainPage" class="hidden">


        <!-- NAVBAR -->

        <div class="navbar bg-white shadow">

            <div class="flex-1">

                <div class="flex items-center gap-2 font-bold text-lg">

                    <img class="w-6" src="./images/github-logo.png" />

                    GitHub Issues Tracker

                </div>

            </div>

            <div class="flex gap-2">

                <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered" />

                <button id="searchBtn" class="btn btn-primary">
                    Search
                </button>

            </div>

        </div>



        <div class="max-w-7xl mx-auto p-6">


            <!-- TABS -->

            <div class="bg-white p-4 rounded-lg shadow mb-6">

                <div class="flex gap-3">

                    <button id="allTab" class="btn btn-primary tabBtn">
                        All
                    </button>

                    <button id="openTab" class="btn btn-outline tabBtn">
                        Open
                    </button>

                    <button id="closedTab" class="btn btn-outline tabBtn">
                        Closed
                    </button>

                </div>

            </div>



            <!-- ISSUE SUMMARY -->

            <div class="bg-white p-5 rounded-lg shadow mb-6 flex justify-between items-center">

                <div class="flex gap-3 items-center">

                    <div class="bg-purple-100 p-3 rounded-full">
                        <img src="./images/Aperture.png" alt="">
                    </div>

                    <div>

                        <h2 id="issueCount" class="font-bold text-lg">
                            0 Issues
                        </h2>

                        <p class="text-sm text-gray-400">
                            Track and manage your project issues
                        </p>

                    </div>

                </div>


                <div class="flex gap-4 text-sm">

                    <span class="flex items-center gap-1">
                        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                        Open
                    </span>

                    <span class="flex items-center gap-1">
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                        Closed
                    </span>

                </div>

            </div>



            <!-- ISSUES GRID -->

            <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

            </div>

        </div>

    </section>




    <!-- MODAL -->

    <dialog id="issueModal" class="modal">

        <div class="modal-box max-w-xl">

            <h3 id="modalTitle" class="text-xl font-bold mb-3"></h3>

            <div class="flex items-center gap-3 mb-3">

                <span id="modalStatus" class="badge badge-success">
                    Opened
                </span>

                <span class="text-sm text-gray-500">
                    Opened by
                    <span id="modalAuthor"></span>
                    •
                    <span id="modalDate"></span>
                </span>

            </div>


            <div class="flex gap-2 mb-4">

                <span class="badge badge-error">
                    BUG
                </span>

                <span class="badge badge-warning">
                    HELP WANTED
                </span>

            </div>


            <p id="modalDescription" class="text-white mb-6"></p>


            <div class="bg-white p-4 rounded-lg flex justify-between">

                <div>
                    <p class="text-sm text-gray-500">Assignee:</p>
                    <p id="modalAssignee" class="font-semibold"></p>
                </div>

                <div>
                    <p class="text-sm text-gray-500">Priority:</p>
                    <span id="modalPriority" class="badge badge-error"></span>
                </div>

            </div>


            <div class="modal-action">

                <form method="dialog">
                    <button class="btn btn-primary">
                        Close
                    </button>
                </form>

            </div>

        </div>

    </dialog>


    <script src="./sena.js"></script>

</body>

</html>
